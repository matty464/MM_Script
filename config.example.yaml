# =============================================================================
# Hyperliquid Market-Making Bot — Configuration
# =============================================================================
# Copy to config.yaml and edit. Start on TESTNET, in PAPER mode, with TINY size.
# =============================================================================

# Network: "testnet" or "mainnet". Always start on testnet.
network: testnet

# Mode:
#   paper  -> simulate fills internally, never sends real orders (SAFEST)
#   live   -> sends real orders to Hyperliquid
mode: paper

# The single perp market to make. Pick a liquid one to start (e.g. ETH, SOL).
# Less competitive small-caps may give wider edges but carry more risk.
symbol: ETH

# ---------------------------------------------------------------------------
# Leverage (live mode only — paper mode ignores this)
# ---------------------------------------------------------------------------
# Per-symbol leverage multiplier set on Hyperliquid at startup.
# Start at 1x; only raise after you understand the liquidation math:
#   max_position_notional / leverage = margin used
#   liquidation ≈ when unrealized loss = (margin - maintenance_margin)
leverage: 1
margin_mode: cross   # "cross" or "isolated"

# ---------------------------------------------------------------------------
# Sizing
# ---------------------------------------------------------------------------
# Notional (USD) per quote on each side.
# At ~$50 you are well above the $10 HL minimum and small enough to be safe.
quote_notional_usd: 50

# Hard cap on absolute position notional (USD). When breached, the bot will
# only quote the side that reduces inventory.
max_position_notional_usd: 500

# ---------------------------------------------------------------------------
# Pricing
# ---------------------------------------------------------------------------
# Minimum half-spread (in basis points, 1bp = 0.01%) you will quote at.
# Must comfortably exceed your maker fee. At base tier, HL maker fee is 1.5bp,
# so a round-trip costs ~3bp. Anything tighter than that loses money on fees alone.
min_half_spread_bps: 4.0

# Volatility multiplier applied to recent realized vol (per second, annualized).
# Effective half-spread = max(min_half_spread_bps, vol_factor * sigma_bps).
vol_factor: 1.5

# Window (seconds) over which to estimate short-term volatility from mid changes.
vol_window_seconds: 60

# EWMA on rolling-window sigma: higher alpha_up = faster reaction to moves;
# lower alpha_down = slower cooldown after a vol spike (less jumpy quotes).
sigma_ewma_alpha_up: 0.30
sigma_ewma_alpha_down: 0.07

# Vol-driven half-spread on the side that *reduces* inventory is multiplied by this
# (1.0 = symmetric). E.g. 0.65 when long: ask uses 65% of the extra vol widening vs bid.
inventory_flatten_vol_half_spread_mult: 0.65

# Inventory skew: how aggressively to shift quotes to flatten position.
# Quote midpoint shift = -skew_bps * (position / max_position).
# Larger value -> faster mean reversion of inventory, but worse fills.
inventory_skew_bps: 6.0

# Re-quote when our resting price drifts more than this many bps from target.
requote_threshold_bps: 1.5

# ---------------------------------------------------------------------------
# Loop / behavior
# ---------------------------------------------------------------------------
# How often (seconds) the strategy loop wakes up to re-evaluate quotes.
loop_interval_seconds: 1.0

# Maximum age (seconds) of the latest book update before we treat the feed as
# stale, cancel everything, and stop quoting.
max_book_age_seconds: 5.0

# Cancel-all on start (clean slate) and on shutdown.
cancel_all_on_start: true
cancel_all_on_exit: true

# When true (default), bid/ask are not sent until you click "Start live quoting"
# in the dashboard. Feeds still run so the ML model can warm up. Set false for
# immediate quoting on startup. Requires dashboard.enabled when true.
manual_quoting_start: true

# ---------------------------------------------------------------------------
# Risk / kill switches
# ---------------------------------------------------------------------------
# If realized session PnL drops below this many USD, the bot stops quoting,
# flattens position with a market order, and exits.
max_session_loss_usd: 50

# If a single fill moves PnL by more than this (USD), pause for `pause_seconds`.
# Helps survive obvious adverse-selection events.
single_fill_pnl_alarm_usd: 25
pause_seconds_after_alarm: 30

# Hard maximum number of orders submitted per minute (rate limit guard).
max_orders_per_minute: 60

# ---------------------------------------------------------------------------
# Machine Learning — fair-value signal (Recursive Least Squares)
# ---------------------------------------------------------------------------
# The ML model predicts short-term price movement from order book features
# and adjusts the fair price accordingly (quotes lead the market instead of
# lagging it). Uses online RLS — no pre-training, no GPU required.
#
# horizon_s: how many seconds ahead to predict. 5-15s is typical for MM.
# forgetting_factor: λ in RLS. 0.99 ≈ half-life ~70 ticks. Lower = adapts
#   faster but more noise-sensitive.
# max_signal_bps: hard clip on the prediction so the model can't move quotes
#   more than this many bp from the baseline. Start low (5-10bp).
# min_updates: don't use predictions until the model has seen this many
#   samples (warm-up period). 30 ≈ 30 seconds at 1s loop.
ml:
  enabled: true
  horizon_s: 10.0
  forgetting_factor: 0.990
  max_signal_bps: 10.0
  min_updates: 30
  # Persistence (state/ml_model.json). Set load_saved: false for a fresh model every run.
  load_saved: true
  save: true

# Adaptive inventory-skew controller (multi-armed bandit). Trials multipliers
# of inventory_skew_bps and learns from per-fill realized PnL which one
# produces the best edge. State persists to state/skew_adapter.json.
adaptive_skew:
  enabled: true
  epsilon: 0.15                  # exploration rate (0=pure exploit, 1=pure random)
  ewma_alpha: 0.2                # how fast per-arm reward updates
  min_pulls_per_switch: 5        # closing fills before switching arms
  multipliers: [0.5, 0.75, 1.0, 1.25, 1.5]
  load_saved: true               # false = ignore state/skew_adapter.json on startup
  save: true                     # false = do not write skew_adapter.json

# ---------------------------------------------------------------------------
# Dashboard (web UI)
# ---------------------------------------------------------------------------
# Lightweight HTTP dashboard for live monitoring. Open http://host:port in a
# browser. Bind to 127.0.0.1 unless you really want it reachable from the
# network — there is no auth.
dashboard:
  enabled: true
  host: 127.0.0.1
  port: 8765
